name: Sync Plugin Source

on:
  push:
    branches:
      - main
      - master
    paths:
      - metadata.yaml
      - logo.png
      - tools/build_plugin_source.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate plugin source JSON
        run: python tools/build_plugin_source.py --workspace . --output plugin_cache.json --branch "${{ github.ref_name }}"

      - name: Commit updated plugin source
        shell: bash
        run: |
          if git diff --quiet -- plugin_cache.json; then
            echo "plugin_cache.json is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugin_cache.json
          git commit -m "chore: sync plugin source"
          git push
